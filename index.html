<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>裤佬永久直链托管</title>
    <script>
        var _hmt = _hmt || [];
        (function() {
          var hm = document.createElement("script");
          hm.src = "https://hm.baidu.com/hm.js?f463aebe70bb41d3370a497b28a6d7ac";

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent-color: #e80860;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }

        body {
            min-height: 100vh;
            display: flex; justify-content: center; align-items: flex-start;
            color: #333; overflow-x: hidden;
            padding: 15px; padding-top: 6vh;
        }

        .background-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; }
        .background-video { width: 100%; height: 100%; object-fit: cover; }
        .background-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.5); z-index: -1;
        }

        .main-layer { width: 100%; max-width: 450px; position: relative; }
        .page-title {
            text-align: center; font-size: 30px; font-weight: 800; margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6b6b, #e80860, #45b7d1, #feca57);
            background-size: 400%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: gradient 8s ease infinite;
        }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .avatar-img {
            width: 85px; height: 85px; border-radius: 50%; object-fit: cover;
            display: block; margin: 0 auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .glass-card {
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 16px; border: 1px solid var(--glass-border); padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1); text-align: center; margin-top: 20px;
        }

        .upload-zone {
            border-radius: 12px; padding: 20px 10px; cursor: pointer;
            background: rgba(255, 255, 255, 0.2); margin-bottom: 15px; transition: 0.3s;
            border: 2px dashed var(--glass-border);
        }

        .format-list {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; margin: 12px 0;
            max-height: 120px; overflow: hidden; /* 增加高度让更多标签露出来 */
        }
        .tag {
            font-size: 9px; background: rgba(255,255,255,0.4); color: #e80860;
            padding: 2px 5px; border-radius: 3px; font-weight: bold; border: 0.5px solid rgba(232, 8, 96, 0.2);
        }

        .upload-info-text { font-size: 13px; font-weight: 600; color: #444; margin-bottom: 8px; }

        .btn {
            background: var(--accent-color); color: white; border: none; padding: 12px;
            border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; transition: 0.3s;
        }

        #progressSection, #resultSection { display: none; margin-top: 15px; }
        .progress-bar { background: rgba(0,0,0,0.1); height: 8px; border-radius: 4px; overflow: hidden; margin: 10px 0; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent-color); transition: 0.2s; }

        .input-group {
            display: flex; background: rgba(255,255,255,0.5); border: 1px solid var(--glass-border); 
            border-radius: 8px; padding: 5px; margin-top: 10px;
        }
        .input-group input { flex: 1; background: transparent; border: none; padding: 8px; font-size: 13px; outline: none; }
        .btn-copy { background: var(--accent-color); color: white; border: none; padding: 0 15px; border-radius: 6px; cursor: pointer; }

        .music-player { position: fixed; bottom: 30px; right: 25px; z-index: 999; }
        .music-btn {
            width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,255,0.3);
            backdrop-filter: blur(10px); border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-size: 20px;
        }
        .music-btn.playing { animation: spin 4s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body onclick="handleFirstClick()">

    <div class="background-layer">
        <video class="background-video" autoplay muted loop playsinline>
            <source src="https://txmov2.a.kwimgs.com/upic/2023/10/13/16/BMjAyMzEwMTMxNjU4MTJfMTcyNTc4NzU4N18xMTQ4OTQ2OTgxMzRfMl8z_b_B209e890a596d64fbd174507b758b0815.mp4" type="video/mp4">
        </video>
        <div class="background-overlay"></div>
    </div>

    <div class="main-layer">
        <div class="page-title">裤佬永久直链托管</div>
        <img class="avatar-img" src="https://mpimg.cn/view.php/f28da3eac8f392e9fa2ba91723b2bf4c.png">

        <div class="glass-card">
            <div id="uploadForm">
                <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
                    <div class="upload-info-text">点击或拖拽上传任何文件</div>
                    <div class="format-list">
                        <span class="tag">MP4</span><span class="tag">M3U8</span><span class="tag">MKV</span><span class="tag">MOV</span><span class="tag">AVI</span><span class="tag">FLV</span><span class="tag">WMV</span>
                        <span class="tag">MP3</span><span class="tag">WAV</span><span class="tag">FLAC</span><span class="tag">OGG</span><span class="tag">M4A</span><span class="tag">AAC</span><span class="tag">APE</span>
                        <span class="tag">JPG</span><span class="tag">PNG</span><span class="tag">GIF</span><span class="tag">WEBP</span><span class="tag">BMP</span><span class="tag">SVG</span><span class="tag">ICO</span>
                        <span class="tag">ZIP</span><span class="tag">7Z</span><span class="tag">RAR</span><span class="tag">TAR</span><span class="tag">GZ</span><span class="tag">ISO</span><span class="tag">DMG</span>
                        <span class="tag">APK</span><span class="tag">IPA</span><span class="tag">EXE</span><span class="tag">PDF</span><span class="tag">TXT</span><span class="tag">JSON</span><span class="tag">XML</span><span class="tag">DOCX</span>
                    </div>
                    <p style="font-size: 11px; color: #666;">☁️ 永久储存 · 📦 256MB内 · ⚡ 智能直链</p>
                    <input type="file" id="fileInput" hidden>
                </div>
                <button class="btn" onclick="document.getElementById('fileInput').click()">立即上传文件</button>
            </div>

            <div id="progressSection">
                <p style="font-size: 14px; font-weight: bold;">🚀 正在同步至云端...</p>
                <div class="progress-bar"><div class="progress-fill" id="progressBar"></div></div>
                <p id="percentText" style="font-size: 12px; color: #e80860;">准备中...</p>
            </div>

            <div id="resultSection">
                <div style="text-align: left;">
                    <span style="font-size: 12px; font-weight: bold; color: #666;">✅ 复制链接导入软件会自动识别：比如m3u,txt</span>
                    <div class="input-group">
                        <input type="text" id="rawLink" readonly>
                        <button class="btn-copy" onclick="copyValue('rawLink', this)">复制</button>
                    </div>
                </div>
                <p style="font-size: 11px; color: #999; margin-top: 15px;">关注TG频道：https://t.me/stymei</p>
                <button class="btn" style="background:none; border:1px solid #e80860; color:#e80860; margin-top: 15px;" onclick="location.reload()">继续上传</button>
            </div>
        </div>
    </div>

    <div class="music-player">
        <div class="music-btn" id="musicBtn">🎵</div>
    </div>
    <audio id="bgMusic" loop src="https://mpimg.cn/view.php/ac863e4b37bd7eb8388e97f15aed64dc.mp3"></audio>

    <script>
        const bgMusic = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        let hasInteracted = false;

        function handleFirstClick() {
            if (!hasInteracted) {
                bgMusic.play().then(() => {
                    musicBtn.classList.add('playing');
                    hasInteracted = true;
                }).catch(e => console.log("播放被拦截"));
            }
        }

        musicBtn.onclick = (e) => {
            e.stopPropagation();
            if (bgMusic.paused) {
                bgMusic.play();
                musicBtn.classList.add('playing');
            } else {
                bgMusic.pause();
                musicBtn.classList.remove('playing');
            }
        };

        const fileInput = document.getElementById('fileInput');
        const WORKER_URL = 'https://cloud.jsnzkpg.ccwu.cc/upload';

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('uploadForm').style.display = 'none';
            document.getElementById('progressSection').style.display = 'block';

            const fd = new FormData();
            fd.append('files[]', file);

            const xhr = new XMLHttpRequest();
            xhr.open('POST', WORKER_URL, true);

            xhr.upload.onprogress = (ev) => {
                const percent = Math.round((ev.loaded / ev.total) * 100);
                document.getElementById('progressBar').style.width = percent + '%';
                document.getElementById('percentText').innerText = `上传进度：${percent}%`;
            };

            xhr.onload = () => {
                if (xhr.status === 200) {
                    document.getElementById('rawLink').value = xhr.responseText.trim();
                    document.getElementById('progressSection').style.display = 'none';
                    document.getElementById('resultSection').style.display = 'block';
                } else {
                    alert('上传失败');
                    location.reload();
                }
            };
            xhr.send(fd);
        };

        function copyValue(id, btn) {
            const input = document.getElementById(id);
            navigator.clipboard.writeText(input.value).then(() => {
                btn.innerText = '已复制';
                setTimeout(() => btn.innerText = '复制', 1500);
            });
        }
    </script>
</body>
</html>
