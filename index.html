<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>卡卡的西 · 灵动玻璃托管</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 20% 30%, #c5d9e8, #eef2f5);
            padding: 20px;
        }

        .main-layer { width: 100%; max-width: 450px; }

        /* 标题区：✨ 卡卡的西 ✨ 渐变 + 微光 */
        .title-wrapper {
            text-align: center;
            margin-bottom: 20px;
        }
        .title-decoration {
            font-size: 36px;
            display: inline-block;
            vertical-align: middle;
            margin: 0 6px;
        }
        .gradient-name {
            background: linear-gradient(135deg, #1e3c4c, #4a7c94, #2c5a6e);
            background-size: 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 36px;
            font-weight: 800;
            display: inline-block;
            animation: shimmer 4s ease infinite;
        }
        @keyframes shimmer {
            0% { text-shadow: 0 0 4px rgba(70,130,200,0.2); }
            50% { text-shadow: 0 0 16px rgba(70,130,200,0.5); }
            100% { text-shadow: 0 0 4px rgba(70,130,200,0.2); }
        }
        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #5d7a8c;
            margin-top: 6px;
        }

        /* 灵动玻璃卡片 */
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255,255,255,0.5);
            padding: 24px 20px;
            transition: all 0.3s ease;
        }

        .upload-zone {
            background: rgba(255, 255, 255, 0.5);
            border: 1.5px dashed rgba(255, 255, 255, 0.8);
            border-radius: 28px;
            padding: 30px 16px;
            text-align: center;
            cursor: pointer;
            transition: 0.25s;
            margin-bottom: 20px;
        }
        .upload-zone:hover {
            background: rgba(255, 255, 255, 0.7);
            border-color: rgba(255, 255, 255, 0.95);
        }
        .upload-icon { font-size: 48px; margin-bottom: 12px; }
        .upload-title { font-weight: 600; font-size: 18px; color: #2c3e4e; margin-bottom: 6px; }
        .upload-info { font-size: 13px; color: #5d7a8c; }

        .btn {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            color: #2c3e4e;
            font-weight: 600;
            padding: 12px;
            border-radius: 40px;
            width: 100%;
            font-size: 17px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:active { transform: scale(0.97); background: rgba(255,255,255,0.55); }

        #progressSection, #resultSection { display: none; margin-top: 20px; }
        .progress-bar { background: rgba(0,0,0,0.1); height: 6px; border-radius: 10px; overflow: hidden; margin: 12px 0; }
        .progress-fill { width: 0%; height: 100%; background: #3a6ea5; transition: 0.2s; }
        .progress-text { font-size: 13px; color: #2c3e4e; text-align: center; }

        .input-group {
            display: flex;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            overflow: hidden;
            margin-top: 8px;
        }
        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 16px;
            font-size: 13px;
            outline: none;
            color: #1e2f3a;
        }
        .btn-copy {
            background: rgba(255, 255, 255, 0.4);
            border: none;
            padding: 0 20px;
            color: #2c3e4e;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-outline {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.8);
            margin-top: 16px;
        }
    </style>
</head>
<body>

<div class="main-layer">
    <div class="title-wrapper">
        <span class="title-decoration">✨</span>
        <span class="gradient-name">卡卡的西</span>
        <span class="title-decoration">✨</span>
        <div class="subtitle">不限格式 · 永久储存 · 极速上传</div>
    </div>

    <div class="glass-card">
        <div id="uploadForm">
            <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon">📂</div>
                <div class="upload-title">点击或拖拽上传文件</div>
                <div class="upload-info">支持任意文件，单个不超过 256MB</div>
                <input type="file" id="fileInput" hidden>
            </div>
            <button class="btn" onclick="document.getElementById('fileInput').click()">选择文件上传</button>
        </div>

        <div id="progressSection">
            <div class="progress-bar"><div class="progress-fill" id="progressBar"></div></div>
            <div class="progress-text" id="percentText">准备上传...</div>
        </div>

        <div id="resultSection">
            <div style="margin-bottom: 10px;">
                <span style="font-size: 13px; font-weight: 600;">✅ 永久直链</span>
                <div class="input-group">
                    <input type="text" id="rawLink" readonly>
                    <button class="btn-copy" onclick="copyValue('rawLink', this)">复制</button>
                </div>
            </div>
            <button class="btn btn-outline" onclick="location.reload()">继续上传</button>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const WORKER_URL = 'https://cloud.jsnzkpg.ccwu.cc/upload';

    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        document.getElementById('uploadForm').style.display = 'none';
        document.getElementById('progressSection').style.display = 'block';

        const fd = new FormData();
        fd.append('files[]', file);

        const xhr = new XMLHttpRequest();
        xhr.open('POST', WORKER_URL, true);

        xhr.upload.onprogress = (ev) => {
            const percent = Math.round((ev.loaded / ev.total) * 100);
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('percentText').innerText = `上传进度：${percent}%`;
        };

        xhr.onload = () => {
            if (xhr.status === 200) {
                document.getElementById('rawLink').value = xhr.responseText.trim();
                document.getElementById('progressSection').style.display = 'none';
                document.getElementById('resultSection').style.display = 'block';
            } else {
                alert('上传失败，请重试');
                location.reload();
            }
        };
        xhr.send(fd);
    };

    function copyValue(id, btn) {
        const input = document.getElementById(id);
        if (!input.value) return;
        navigator.clipboard.writeText(input.value).then(() => {
            btn.innerText = '已复制';
            setTimeout(() => btn.innerText = '复制', 1500);
        });
    }
</script>
</body>
</html>
