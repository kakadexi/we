        .glass-card {

            border-radius: 12px; border: 1px solid var(--glass-border); padding: 25px;
            box-shadow: var(--glass-shadow); text-align: center; margin-top: 25px;

        .upload-zone {
            border-radius: 12px; padding: 30px 15px; cursor: pointer;
            background: rgba(255, 255, 255, 0.2); margin-bottom: 15px; transition: 0.3s;
            border: 2px dashed var(--glass-border);
        }
        .upload-zone:hover { background: rgba(255, 255, 255, 0.3); }
        .upload-info { font-size: 12px; color: #555; margin-top: 10px; line-height: 1.6; }

        .btn {
            background: var(--accent-color); color: white; border: none; padding: 12px;
            border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; transition: 0.3s;
        }
        .btn:active { transform: scale(0.98); }

        #progressSection, #resultSection { display: none; margin-top: 20px; }
        .progress-bar { background: rgba(0,0,0,0.1); height: 8px; border-radius: 4px; overflow: hidden; margin: 10px 0; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent-color); transition: 0.3s; }

        .result-item { text-align: left; margin-bottom: 12px; }
        .label { font-size: 11px; color: #666; font-weight: bold; margin-bottom: 4px; display: block; }
        .input-group {
            display: flex; background: rgba(255,255,255,0.4); border: 1px solid var(--glass-border); border-radius: 6px; padding: 4px;
        }
        .input-group input { flex: 1; background: transparent; border: none; padding: 6px; font-size: 12px; outline: none; color: #333; }
        .btn-copy { background: var(--accent-color); color: white; border: none; padding: 0 12px; border-radius: 4px; font-size: 11px; cursor: pointer; }

        .music-player { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        .music-toggle {
            width: 45px; height: 45px; border-radius: 50%; background: var(--glass-bg);
            backdrop-filter: blur(10px); border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .music-toggle.playing { animation: rotate 4s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .music-toggle::after { content: "♫"; font-size: 20px; color: var(--accent-color); }
        
        .format-hint {

            margin-top: 8px;

        .error-message {

            margin-top: 10px;

            background: rgba(255,107,107,0.1);
            border-radius: 6px;
            display: none;
        }
    </style>

<body>

        <div class="glass-card">
            <div id="uploadForm">
                <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                    <div style="font-size: 40px;">📂</div>

                <p style="font-size: 13px;">✈️TG频道https://t.me/+vaYeXvNp91NlOTNl </p>

                <p id="percentText" style="font-size: 12px; color: var(--accent-color);">等待上传中...</p>

                </div>
                <button class="btn" style="background:transparent; border:1px solid var(--accent-color); color:var(--accent-color); margin-top: 10px;" onclick="location.reload()">重新上传</button>

    <div class="music-player">
        <div class="music-toggle" id="musicToggle"></div>
    </div>
    <audio id="bgMusic" loop preload="auto" src="https://mpimg.cn/view.php/ac863e4b37bd7eb8388e97f15aed64dc.mp3"></audio>

    <script>
        const bgMusic = document.getElementById('bgMusic');
        const musicToggle = document.getElementById('musicToggle');
        const fileInput = document.getElementById('fileInput');
        
        const PROXY_GATEWAY = 'https://proxy.api.030101.xyz/';
        const API_URL = 'https://catbox.moe/user/api.php';
        
        function buildMirrorWithProxy(originalUrl) {
            if (!originalUrl) return '';
            let cleanUrl = originalUrl.replace(/^https?:\/\//, '');
            return PROXY_GATEWAY + cleanUrl;
        }
        
        function tryPlayMusic() {
            bgMusic.muted = true;
            bgMusic.play().then(() => {
                musicToggle.classList.add('playing');
            }).catch(() => {});
        }
        
        window.addEventListener('click', () => {
            if (bgMusic.muted) {
                bgMusic.muted = false;
                if (bgMusic.paused) bgMusic.play();
                musicToggle.classList.add('playing');
            }
        }, { once: true });
        
        musicToggle.onclick = (e) => {
            e.stopPropagation();
            if (bgMusic.paused) {
                bgMusic.muted = false;
                bgMusic.play();
                musicToggle.classList.add('playing');
            } else {
                bgMusic.pause();
                musicToggle.classList.remove('playing');
            }
        };
        
        window.addEventListener('load', tryPlayMusic);
        
        const dropZone = document.getElementById('dropZone');
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });
        
        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }
        
        dropZone.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            if (files && files.length > 0) {
                fileInput.files = files;
                handleUpload(files[0]);
            }
        });
        
        fileInput.onchange = (e) => { 
            if(e.target.files && e.target.files[0]) {
                handleUpload(e.target.files[0]);
            }
        };
        
        function resetToUploadForm() {
            document.getElementById('progressSection').style.display = 'none';
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('uploadForm').style.display = 'block';
            document.getElementById('fileInput').value = '';
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('errorMsg').innerHTML = '';
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.innerHTML = '❌ ' + message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                if (errorDiv.style.display === 'block') {
                    resetToUploadForm();
                }
            }, 3000);
        }
        
        async function handleUpload(file) {
            if (file.size > 200 * 1024 * 1024) {
                alert('文件超过200MB限制，请重新选择！');
                return;
            }
            
            document.getElementById('uploadForm').style.display = 'none';
            document.getElementById('progressSection').style.display = 'block';
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('percentText').innerHTML = '准备上传...';
            document.getElementById('errorMsg').style.display = 'none';
            
            const fd = new FormData();
            fd.append('reqtype', 'fileupload');
            fd.append('fileToUpload', file);
            
            const CF_PROXY = 'https://proxy.jsnzkpg.uk/?url=';
            
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                const targetUrl = CF_PROXY + encodeURIComponent(API_URL);
                xhr.open('POST', targetUrl, true);
                xhr.timeout = 60000;
                
                let lastProgress = 0;
                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const percent = Math.round((e.loaded / e.total) * 100);
                        if (percent !== lastProgress) {
                            lastProgress = percent;
                            document.getElementById('progressBar').style.width = percent + '%';
                            document.getElementById('percentText').innerHTML = `上传进度: ${percent}% 🚀`;
                            if (percent === 100) {
                                document.getElementById('percentText').innerHTML = `上传完成，等待服务器响应... ⏳`;
                            }
                        }
                    }
                };
                
                xhr.onload = () => {
                    if (xhr.status === 200) {
                        let responseUrl = xhr.responseText.trim();
                        if (responseUrl && (responseUrl.startsWith('http://') || responseUrl.startsWith('https://'))) {
                            document.getElementById('rawLink').value = responseUrl;
                            const newAccelLink = buildMirrorWithProxy(responseUrl);
                            document.getElementById('proxyLink').value = newAccelLink;
                            document.getElementById('progressSection').style.display = 'none';
                            document.getElementById('resultSection').style.display = 'block';
                            resolve(responseUrl);
                        } else {
                            showError('服务器返回无效链接，请重试');
                            reject(new Error('Invalid response'));
                        }
                    } else {
                        showError(`上传失败 (${xhr.status})，请稍后重试`);
                        reject(new Error(`HTTP ${xhr.status}`));
                    }
                };
                
                xhr.ontimeout = () => {
                    showError('上传超时，请检查网络后重试');
                    reject(new Error('Timeout'));
                };
                
                xhr.onerror = () => {
                    showError('网络连接失败，请检查网络后重试');
                    reject(new Error('Network Error'));
                };
                
                xhr.send(fd);
            }).catch(err => {
                console.warn(err);
            });
        }
        
        function copyValue(id, btn) {
            const input = document.getElementById(id);
            if (!input || !input.value) {
                alert('没有可复制的内容');
                return;
            }
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(input.value).then(() => {
                    const originalText = btn.innerText;
                    btn.innerText = '✓ 已复制';
                    setTimeout(() => {
                        btn.innerText = originalText;
                    }, 1500);
                }).catch(() => {
                    fallbackCopy(input, btn);
                });
            } else {
                fallbackCopy(input, btn);
            }
        }
        
        function fallbackCopy(input, btn) {
            input.select();
            input.setSelectionRange(0, 99999);
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    const originalText = btn.innerText;
                    btn.innerText = '✓ 已复制';
                    setTimeout(() => {
                        btn.innerText = originalText;
                    }, 1500);
                } else {
                    alert('手动复制吧，选中后 Ctrl+C');
                }
            } catch (err) {
                alert('复制失败，请手动复制');
            }
        }
        
        dropZone.addEventListener('dragenter', (e) => {
            dropZone.style.background = 'rgba(255,255,255,0.4)';
            dropZone.style.borderColor = '#4a6cf7';
        });
        dropZone.addEventListener('dragleave', (e) => {
            dropZone.style.background = 'rgba(255,255,255,0.2)';
            dropZone.style.borderColor = 'var(--glass-border)';
        });
        dropZone.addEventListener('drop', (e) => {
            dropZone.style.background = 'rgba(255,255,255,0.2)';
            dropZone.style.borderColor = 'var(--glass-border)';
        });
    </script>
</body>
