<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>卡卡的西 · 水光琉璃托管</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* 日间主题（默认） */
        body {
            transition: background 0.3s ease, color 0.3s ease;
        }
        body.theme-day {
            background: radial-gradient(circle at 30% 20%, rgba(180, 220, 255, 0.9), rgba(255, 255, 255, 0.95));
        }
        body.theme-night {
            background: radial-gradient(circle at 30% 20%, #0a1a2a, #0f2a3a);
        }

        /* 日间卡片样式 */
        body.theme-day .card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.5);
            color: #2c3e4e;
        }
        body.theme-night .card {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
        }

        /* 日间文字颜色 */
        body.theme-day .gradient-name {
            background: linear-gradient(135deg, #1e3c4c, #4a7c94, #2c5a6e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px rgba(70, 130, 200, 0.4);
        }
        body.theme-night .gradient-name {
            background: linear-gradient(135deg, #b0d4ff, #7cb8f0, #4a90e2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px rgba(120, 180, 255, 0.6);
        }

        body.theme-day .subtitle,
        body.theme-day .upload-title,
        body.theme-day .upload-info,
        body.theme-day .label,
        body.theme-day .progress-text,
        body.theme-day .btn,
        body.theme-day .btn-copy {
            color: #2c3e4e;
        }
        body.theme-night .subtitle,
        body.theme-night .upload-title,
        body.theme-night .upload-info,
        body.theme-night .label,
        body.theme-night .progress-text,
        body.theme-night .btn,
        body.theme-night .btn-copy {
            color: #f0f0f0;
        }

        body.theme-day .upload-zone {
            background: rgba(255, 255, 255, 0.5);
            border-color: rgba(255, 255, 255, 0.8);
        }
        body.theme-night .upload-zone {
            background: rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.3);
        }
        body.theme-night .upload-zone:hover {
            background: rgba(0, 0, 0, 0.6);
            border-color: rgba(255, 255, 255, 0.5);
        }

        body.theme-day .btn {
            background: rgba(255, 255, 255, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.7);
            color: #2c3e4e;
        }
        body.theme-night .btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #ffffff;
        }
        body.theme-night .btn-outline {
            background: rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.4);
        }
        body.theme-day .input-group {
            background: rgba(255, 255, 255, 0.5);
            border-color: rgba(255, 255, 255, 0.7);
        }
        body.theme-night .input-group {
            background: rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.3);
        }
        body.theme-night .input-group input {
            color: #ffffff;
        }
        body.theme-night .btn-copy {
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
        }

        /* 背景视频叠加层调整 */
        .background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }
        .background-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: background 0.3s ease;
            z-index: -1;
        }
        body.theme-day .background-overlay {
            background: rgba(255, 255, 255, 0.7);
        }
        body.theme-night .background-overlay {
            background: rgba(0, 0, 0, 0.6);
        }

        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* 标题区域 */
        .title-section {
            text-align: center;
            margin-bottom: 8px;
        }
        .gradient-name {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -0.5px;
            display: inline-block;
            animation: shimmer 4s ease infinite;
        }
        @keyframes shimmer {
            0% { text-shadow: 0 0 4px rgba(70, 130, 200, 0.2); filter: brightness(1); }
            50% { text-shadow: 0 0 16px rgba(70, 130, 200, 0.7); filter: brightness(1.05); }
            100% { text-shadow: 0 0 4px rgba(70, 130, 200, 0.2); filter: brightness(1); }
        }
