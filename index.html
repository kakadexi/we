<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>卡卡的西永久直链托管</title>
    <script>
        var _hmt = _hmt || [];
        (function() {
          var hm = document.createElement("script");
          hm.src = "https://hm.baidu.com/hm.js?f463aebe70bb41d3370a497b28a6d7ac";
          var s = document.getElementsByTagName("script")[0]; 
          s.parentNode.insertBefore(hm, s);
        })();
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f5f5f7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 简约容器 */
        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        /* 页面主标题 */
        .page-title {
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            color: #1c1c1e;
            letter-spacing: -0.3px;
        }

        .subtitle {
            text-align: center;
            font-size: 15px;
            color: #8e8e93;
            margin-bottom: 32px;
        }

        /* iOS 风格卡片 */
        .card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04), 0 0 1px rgba(0, 0, 0, 0.05);
            padding: 24px 20px;
            margin-bottom: 20px;
        }

        /* 上传区域 */
        .upload-zone {
            background: #f9f9fb;
            border: 1.5px dashed #c6c6c8;
            border-radius: 16px;
            padding: 32px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 16px;
        }

        .upload-zone:hover {
            background: #f2f2f5;
            border-color: #007aff;
        }

        .upload-icon {
            font-size: 44px;
            margin-bottom: 12px;
        }

        .upload-title {
            font-weight: 600;
            font-size: 17px;
            color: #1c1c1e;
            margin-bottom: 6px;
        }

        .upload-info {
            font-size: 13px;
            color: #8e8e93;
            line-height: 1.5;
        }

        .btn {
            background: #007aff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 17px;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:active {
            background: #005fc1;
            transform: scale(0.97);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #007aff;
            color: #007aff;
            margin-top: 12px;
        }

        .btn-outline:active {
            background: rgba(0, 122, 255, 0.1);
            transform: scale(0.97);
        }

        #progressSection, #resultSection {
            display: none;
            margin-top: 20px;
        }

        .progress-bar {
            background: #e9e9ef;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin: 12px 0;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #007aff;
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 13px;
            color: #007aff;
            text-align: center;
            margin-top: 8px;
        }

        .result-item {
            margin-bottom: 20px;
        }

        .label {
            font-size: 13px;
            font-weight: 600;
            color: #1c1c1e;
            margin-bottom: 6px;
            display: block;
        }

        .input-group {
            display: flex;
            background: #f9f9fb;
            border-radius: 12px;
            border: 1px solid #e5e5ea;
            overflow: hidden;
        }

        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px;
            font-size: 14px;
            outline: none;
            color: #1c1c1e;
        }

        .btn-copy {
            background: transparent;
            border: none;
            padding: 0 16px;
            color: #007aff;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
        }

        .btn-copy:active {
            opacity: 0.6;
        }

        .error-message {
            background: #ffe9e9;
            color: #ff3b30;
            font-size: 13px;
            padding: 12px;
            border-radius: 12px;
            margin-top: 12px;
            display: none;
            text-align: center;
        }

        .promo-link {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
        }

        .promo-link a {
            color: #007aff;
            text-decoration: none;
            font-weight: 500;
        }

        .promo-link a:active {
            opacity: 0.7;
        }

        .footer-note {
            text-align: center;
            font-size: 12px;
            color: #8e8e93;
            margin-top: 24px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="page-title">卡卡的西永久直链托管</div>
    <div class="subtitle">不限格式 · 200MB内 · 永久储存</div>

    <div class="card">
        <div id="uploadForm">
            <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon">📂</div>
                <div class="upload-title">点击或拖拽上传</div>
                <div class="upload-info">支持任意文件，单个不超过 200MB</div>
                <input type="file" id="fileInput" hidden>
            </div>
            <button class="btn" id="uploadBtn" onclick="document.getElementById('fileInput').click()">选择文件上传</button>
        </div>

        <div id="progressSection">
            <div class="progress-bar"><div class="progress-fill" id="progressBar"></div></div>
            <div class="progress-text" id="percentText">准备上传...</div>
            <div id="errorMsg" class="error-message"></div>
        </div>

        <div id="resultSection">
            <div class="result-item">
                <span class="label">🔗 原始官方链接 (Catbox)</span>
                <div class="input-group">
                    <input type="text" id="rawLink" readonly>
                    <button class="btn-copy" onclick="copyValue('rawLink', this)">复制</button>
                </div>
            </div>
            <div class="result-item">
                <span class="label">⚡ 镜像加速链接（通过代理）</span>
                <div class="input-group">
                    <input type="text" id="proxyLink" readonly>
                    <button class="btn-copy" onclick="copyValue('proxyLink', this)">复制</button>
                </div>
            </div>
            <button class="btn btn-outline" onclick="resetUpload()">重新上传</button>
        </div>
    </div>

    <!-- 你的推广链接（请替换为实际地址） -->
    <div class="promo-link">
        📢 我的 Telegram 频道：<a href="https://t.me/+vaYeXvNp91NlOTNl" target="_blank" rel="noopener noreferrer">https://t.me/你的频道</a>
    </div>
    <div class="footer-note">
        文件永久保存，镜像加速由第三方提供，请勿上传敏感内容
    </div>
</div>

<script>
    // ---------- 配置 ----------
    const PROXY_GATEWAY = 'https://proxy.api.030101.xyz/';  // 第三方镜像代理（可替换为你自己的）
    const API_URL = 'https://catbox.moe/user/api.php';
    const CF_PROXY = 'https://proxy.jsnzkpg.uk/?url=';      // 上传用的 CORS 代理

    function buildMirrorWithProxy(originalUrl) {
        if (!originalUrl) return '';
        let cleanUrl = originalUrl.replace(/^https?:\/\//, '');
        return PROXY_GATEWAY + cleanUrl;
    }

    // DOM 元素
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const uploadFormDiv = document.getElementById('uploadForm');
    const progressSection = document.getElementById('progressSection');
    const resultSection = document.getElementById('resultSection');
    const progressBar = document.getElementById('progressBar');
    const percentText = document.getElementById('percentText');
    const errorMsgDiv = document.getElementById('errorMsg');
    const rawLinkInput = document.getElementById('rawLink');
    const proxyLinkInput = document.getElementById('proxyLink');

    function resetUpload() {
        uploadFormDiv.style.display = 'block';
        progressSection.style.display = 'none';
        resultSection.style.display = 'none';
        fileInput.value = '';
        errorMsgDiv.style.display = 'none';
        errorMsgDiv.innerHTML = '';
        progressBar.style.width = '0%';
        percentText.innerText = '';
    }

    function showError(message) {
        errorMsgDiv.innerHTML = '❌ ' + message;
        errorMsgDiv.style.display = 'block';
        setTimeout(() => {
            if (errorMsgDiv.style.display === 'block') {
                resetUpload();
            }
        }, 4000);
    }

    async function handleUpload(file) {
        if (!file) return;
        if (file.size > 200 * 1024 * 1024) {
            alert('文件超过 200MB 限制，请重新选择');
            return;
        }

        uploadFormDiv.style.display = 'none';
        progressSection.style.display = 'block';
        progressBar.style.width = '0%';
        percentText.innerText = '准备上传...';
        errorMsgDiv.style.display = 'none';

        const fd = new FormData();
        fd.append('reqtype', 'fileupload');
        fd.append('fileToUpload', file);

        const targetUrl = CF_PROXY + encodeURIComponent(API_URL);

        return new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', targetUrl, true);
            xhr.timeout = 60000;

            let lastPercent = 0;
            xhr.upload.onprogress = (e) => {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    if (percent !== lastPercent) {
                        lastPercent = percent;
                        progressBar.style.width = percent + '%';
                        percentText.innerText = `上传进度: ${percent}% 🚀`;
                        if (percent === 100) {
                            percentText.innerText = '上传完成，等待服务器响应... ⏳';
                        }
                    }
                }
            };

            xhr.onload = () => {
                if (xhr.status === 200) {
                    let responseUrl = xhr.responseText.trim();
                    if (responseUrl && (responseUrl.startsWith('http://') || responseUrl.startsWith('https://'))) {
                        rawLinkInput.value = responseUrl;
                        proxyLinkInput.value = buildMirrorWithProxy(responseUrl);
                        progressSection.style.display = 'none';
                        resultSection.style.display = 'block';
                        resolve(responseUrl);
                    } else {
                        showError('服务器返回无效链接，请重试');
                        reject(new Error('Invalid response'));
                    }
                } else {
                    showError(`上传失败 (${xhr.status})，请稍后重试`);
                    reject(new Error(`HTTP ${xhr.status}`));
                }
            };

            xhr.ontimeout = () => {
                showError('上传超时，请检查网络后重试');
                reject(new Error('Timeout'));
            };

            xhr.onerror = () => {
                showError('网络连接失败，请检查网络后重试');
                reject(new Error('Network Error'));
            };

            xhr.send(fd);
        }).catch(err => {
            console.warn(err);
        });
    }

    // 触发上传
    fileInput.onchange = (e) => {
        if (e.target.files && e.target.files[0]) {
            handleUpload(e.target.files[0]);
        }
    };

    // 拖拽上传
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, preventDefaults, false);
    });
    function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
    }
    dropZone.addEventListener('dragenter', () => {
        dropZone.style.background = '#f2f2f5';
        dropZone.style.borderColor = '#007aff';
    });
    dropZone.addEventListener('dragleave', () => {
        dropZone.style.background = '#f9f9fb';
        dropZone.style.borderColor = '#c6c6c8';
    });
    dropZone.addEventListener('drop', (e) => {
        dropZone.style.background = '#f9f9fb';
        dropZone.style.borderColor = '#c6c6c8';
        const files = e.dataTransfer.files;
        if (files && files.length > 0) {
            fileInput.files = files;
            handleUpload(files[0]);
        }
    });

    function copyValue(id, btn) {
        const input = document.getElementById(id);
        if (!input || !input.value) {
            alert('没有可复制的内容');
            return;
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(input.value).then(() => {
                const originalText = btn.innerText;
                btn.innerText = '✓ 已复制';
                setTimeout(() => {
                    btn.innerText = originalText;
                }, 1500);
            }).catch(() => fallbackCopy(input, btn));
        } else {
            fallbackCopy(input, btn);
        }
    }

    function fallbackCopy(input, btn) {
        input.select();
        input.setSelectionRange(0, 99999);
        try {
            document.execCommand('copy');
            const originalText = btn.innerText;
            btn.innerText = '✓ 已复制';
            setTimeout(() => {
                btn.innerText = originalText;
            }, 1500);
        } catch (err) {
            alert('复制失败，请手动复制');
        }
    }

    // 暴露 resetUpload 给全局
    window.resetUpload = resetUpload;
</script>
</body>
</html>
