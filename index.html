<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>裤佬永久直链托管</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --text-primary: #333;
            --accent-color: #4a6cf7;
            --accent-hover: #3a5ce5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            color: var(--text-primary);
            overflow: hidden;
            position: relative;
            padding: 15px;
            padding-top: 8vh;
        }

        .background-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; }
        .background-video { width: 100%; height: 100%; object-fit: cover; }
        .background-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.7);
            z-index: -1;
        }

        .marquee-container {
            position: fixed;
            top: 0; left: 0; width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 8px 0;
            box-shadow: var(--glass-shadow);
            overflow: hidden;
            z-index: 100;
        }
        .marquee {
            white-space: nowrap;
            display: flex;
            animation: marquee 15s linear infinite;
        }
        .marquee a {
            color: var(--text-primary);
            font-weight: bold;
            text-decoration: none;
            padding: 0 15px;
            font-size: 14px;
        }
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .avatar-container {
            text-align: center;
            margin-bottom: 0;
            line-height: 0;
        }
        .avatar-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: none;
            background: transparent;
            transition: transform 0.3s ease;
            display: block;
            margin: 0 auto;
        }
        .avatar-img:hover { transform: scale(1.05); }

        .page-title {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4, #feca57, #ff9ff3, #54a0ff);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 8s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .main-layer { width: 100%; max-width: 450px; margin-top: 0; }
        
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            padding: 25px;
            box-shadow: var(--glass-shadow);
            text-align: center;
            margin-top: 30px;
        }

        .upload-zone {
            border-radius: 12px;
            padding: 30px 20px 25px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            margin-bottom: 15px;
            transition: 0.3s;
            position: relative;
        }
        .upload-zone:hover { background: rgba(255, 255, 255, 0.3); transform: scale(1.02); }

        .upload-hint {
            margin-top: 15px;
            font-size: 12px;
            color: #2c7a4d;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(2px);
            padding: 8px 10px;
            border-radius: 20px;
            display: inline-block;
            border: 1px dashed #2c7a4d;
            line-height: 1.5;
            font-weight: 500;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .upload-hint span {
            font-weight: 600;
            background: #2c7a4d;
            color: white;
            border-radius: 16px;
            padding: 2px 8px;
            margin: 0 2px;
            font-size: 11px;
        }

        .btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            transition: 0.3s;
        }

        #progressSection, #resultSection { display: none; margin-top: 20px; }
        .progress-bar { background: rgba(0,0,0,0.1); height: 8px; border-radius: 4px; overflow: hidden; margin: 10px 0; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent-color); transition: 0.3s; }

        .result-item { text-align: left; margin-bottom: 15px; }
        .label { font-size: 11px; color: #666; font-weight: bold; margin-bottom: 4px; display: block; }
        .input-group {
            display: flex; background: rgba(255,255,255,0.4); border: 1px solid var(--glass-border); border-radius: 6px; padding: 4px;
        }
        .input-group input { flex: 1; background: transparent; border: none; padding: 6px; font-size: 12px; outline: none; }
        .btn-copy { background: var(--accent-color); color: white; border: none; padding: 0 12px; border-radius: 4px; font-size: 11px; cursor: pointer; }

        .music-player { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        .music-toggle {
            width: 50px; height: 50px; border-radius: 50%; background: var(--glass-bg);
            backdrop-filter: blur(12px); border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            box-shadow: var(--glass-shadow);
        }
        .music-toggle.playing { animation: rotate 3s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .music-toggle::after { content: "♫"; font-size: 24px; color: var(--accent-color); }
        
        #retryNotice { display: none; } 
    </style>

        var _hmt = _hmt || [];
        (function() {
          var hm = document.createElement("script");
          hm.src = "https://hm.baidu.com/hm.js?f463aebe70bb41d3370a497b28a6d7ac";

          s.parentNode.insertBefore(hm, s);
        })();
    </script>
</head>
<body>

    <div class="background-layer">
        <video class="background-video" autoplay muted loop playsinline>
            <source src="https://txmov2.a.kwimgs.com/upic/2023/10/13/16/BMjAyMzEwMTMxNjU4MTJfMTcyNTc4NzU4N18xMTQ4OTQ2OTgxMzRfMl8z_b_B209e890a596d64fbd174507b758b0815.mp4" type="video/mp4">
        </video>
        <div class="background-overlay"></div>
    </div>

    <div class="marquee-container">
        <div class="marquee">
            <a href="https://kelayun.notepin.co" target="_blank">✈️克拉云机场，月付2元1000G流量，超低延迟的家宽ip，不限速不限设备</a>
        </div>
    </div>

    <div class="main-layer">
        <div class="page-title">裤佬永久直链托管</div>
        
        <div class="avatar-container">
            <img class="avatar-img" src="https://mpimg.cn/view.php/f28da3eac8f392e9fa2ba91723b2bf4c.png" alt="裤佬头像" title="裤佬">
        </div>

        <div class="glass-card">
            <div id="uploadForm">
                <div class="upload-zone" id="dropZone">
                    <div style="font-size: 40px;">🔗</div>
                    <p style="font-size: 14px; color: #555; margin-top: 5px;">点击或将文件拖拽至此处</p>
                    <div class="upload-hint">
                        ⚡ 不限格式 · 不限大小 · 永久储存
                    </div>
                    <input type="file" id="fileInput" hidden>
                </div>
                <button class="btn" onclick="document.getElementById('fileInput').click()">选择文件并上传</button>
            </div>

            <div id="progressSection">
                <p style="font-size: 13px;">✈️TG频道https://t.me/stymei </p>
                <div class="progress-bar"><div class="progress-fill" id="progressBar"></div></div>
                <p id="percentText" style="font-size: 12px; color: var(--accent-color);">0%</p>
                <p id="errorMessage" style="font-size: 12px; color: #d14545; display: none;"></p>
                <p id="retryNotice" style="display:none;"></p>
            </div>

            <div id="resultSection">
                <div class="result-item">
                    <span class="label">🔗 复制永久直链地址</span>
                    <div class="input-group">
                        <input type="text" id="rawLink" readonly>
                        <button class="btn-copy" onclick="copyValue('rawLink', this)">复制</button>
                    </div>
                </div>
                <button class="btn" style="background:transparent; border:1px solid var(--accent-color); color:var(--accent-color);" onclick="location.reload()">重新上传</button>
            </div>
        </div>
    </div>

    <div class="music-player">
        <div class="music-toggle" id="musicToggle"></div>
    </div>
    <audio id="bgMusic" loop src="https://mpimg.cn/view.php/ac863e4b37bd7eb8388e97f15aed64dc.mp3"></audio>

    <script>
        const bgMusic = document.getElementById('bgMusic');
        const musicToggle = document.getElementById('musicToggle');
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const errorMessage = document.getElementById('errorMessage');

        window.addEventListener('load', () => {
            bgMusic.muted = true;
            bgMusic.play().then(() => {
                musicToggle.classList.add('playing');
                document.body.addEventListener('click', () => { bgMusic.muted = false; }, { once: true });
            }).catch(() => {});
        });

        musicToggle.onclick = () => {
            if (bgMusic.paused) { bgMusic.play(); musicToggle.classList.add('playing'); }
            else { bgMusic.pause(); musicToggle.classList.remove('playing'); }
        };

        const API = 'https://file.panell.pp.ua/';

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => { if(e.target.files[0]) handleUpload(e.target.files[0]); };
        
        async function handleUpload(file) {
            document.getElementById('uploadForm').style.display = 'none';
            document.getElementById('progressSection').style.display = 'block';
            errorMessage.style.display = 'none';

            const fd = new FormData();
            fd.append('file', file);

            const xhr = new XMLHttpRequest();
            xhr.open('POST', API);

            xhr.upload.onprogress = (e) => {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    document.getElementById('progressBar').style.width = percent + '%';
                    document.getElementById('percentText').innerText = percent + '%';
                }
            };

            xhr.onload = () => {
                try {
                    const responseText = xhr.responseText.trim();
                    console.log('Response:', responseText);
                    
                    if (xhr.status === 200) {
                        const urlMatch = responseText.match(/https?:\/\/[^\s"']+/);
                        if (urlMatch) {
                            const raw = urlMatch[0];
                            document.getElementById('rawLink').value = raw;
                            
                            document.getElementById('progressSection').style.display = 'none';
                            document.getElementById('resultSection').style.display = 'block';
                            return;
                        } else {
                            errorMessage.style.display = 'block';
                            errorMessage.innerText = '上传失败：未获取到文件链接';
                        }
                    } else {
                        errorMessage.style.display = 'block';
                        errorMessage.innerText = '上传失败：服务器返回状态码 ' + xhr.status;
                    }
                } catch (e) {
                    errorMessage.style.display = 'block';
                    errorMessage.innerText = '上传失败：解析响应时出错';
                }
            };

            xhr.onerror = () => {
                errorMessage.style.display = 'block';
                errorMessage.innerText = '网络错误，请检查API地址是否可访问';
            };

            xhr.send(fd);
        }

        function copyValue(id, btn) {
            const input = document.getElementById(id);
            input.select();
            document.execCommand('copy');
            const originalText = btn.innerText;
            btn.innerText = '成功';
            setTimeout(() => btn.innerText = originalText, 2000);
        }
    </script>
</body>
